<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cobro - Imprenta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Unbounded:wght@200..900&display=swap"
        rel="stylesheet">
</head>

<body class="bg-secondary-subtle min-vh-100">

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="bg-white px-5 py-5 shadow-sm" style="width: 580px;">

            <h1 class="text-center fw-bold mb-4 fs-2">Ticket de Venta</h1>

            <!-- RESUMEN -->
            <h6 class="text-muted mb-3">Resumen del pedido</h6>
            <div class="row mb-1"><span class="col-6">Tipo de hoja:</span><span class="col-6 text-end fw-bold"
                    id="r-hoja"></span></div>
            <div class="row mb-1"><span class="col-6">Tamaño:</span><span class="col-6 text-end fw-bold"
                    id="r-tamano"></span></div>
            <div class="row mb-1"><span class="col-6">Tipo de impresión:</span><span class="col-6 text-end fw-bold"
                    id="r-impresion"></span></div>
            <div class="row mb-1"><span class="col-6">Urgencia:</span><span class="col-6 text-end fw-bold"
                    id="r-urgencia"></span></div>
            <div class="row mb-1"><span class="col-6">Cantidad:</span><span class="col-6 text-end fw-bold"
                    id="r-cantidad"></span></div>
            <div class="row mb-1"><span class="col-6">Costo papel:</span><span class="col-6 text-end"
                    id="r-papel"></span></div>
            <div class="row mb-1"><span class="col-6">Costo tinta:</span><span class="col-6 text-end"
                    id="r-tinta"></span></div>
            <div class="row mb-3"><span class="col-6">Recargo:</span><span class="col-6 text-end" id="r-recargo"></span>
            </div>

            <div class="bg-info-subtle text-center py-3 mb-4">
                <span class="fs-4 fw-bold text-success" id="r-total"></span>
            </div>

            <hr>

            <!-- COBRO -->
            <h6 class="text-muted mb-3">Ingresa el pago del cliente</h6>
            <div class="row align-items-center mb-3">
                <label class="col-5 col-form-label" for="inp-pagado">Cantidad recibida:</label>
                <div class="col-7">
                    <div class="input-group input-group-sm">
                        <span class="input-group-text rounded-0">$</span>
                        <input type="number" class="form-control rounded-0" id="inp-pagado" min="0" step="0.50"
                            placeholder="0.00" oninput="calcCambio()">
                    </div>
                </div>
            </div>

            <div class="bg-light py-3 px-4 mb-4 d-flex justify-content-between align-items-center">
                <span class="fs-6">Cambio:</span>
                <span class="fs-3 fw-bold" id="res-cambio">—</span>
            </div>

            <div class="row">
                <div class="col-6">
                    <a href="index.html" class="btn btn-outline-secondary w-100 rounded-0">← Volver</a>
                </div>
                <div class="col-6">
                    <button class="btn btn-success w-100 rounded-0" id="btn-guardar" disabled onclick="guardarCobro()">
                        Guardar cobro
                    </button>
                </div>
            </div>

            <div id="msg-status" class="mt-3 text-center" style="display:none"></div>

            <div id="msg-status" class="mt-3 text-center" style="display:none"></div>

            <button class="btn btn-outline-primary w-100 rounded-0 mt-2" id="btn-ticket" disabled
                onclick="generarTicket()">
                Descargar Ticket PDF
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="js/cobro.js"></script>
</body>

</html>
